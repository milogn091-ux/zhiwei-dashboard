<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>知微工作 Dashboard</title>
  <style>
    :root {
      --bg: #0a0f1a;
      --card: rgba(14, 21, 38, 0.96);
      --line: rgba(148, 163, 184, 0.14);
      --text: #eef4ff;
      --muted: #9bb0ca;
      --soft: #d9e6fb;
      --green: #4ade80;
      --blue: #60a5fa;
      --amber: #fbbf24;
      --purple: #a78bfa;
      --teal: #2dd4bf;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", sans-serif;
      background: radial-gradient(ellipse at top left, rgba(96,165,250,.12) 0%, transparent 40%),
                  radial-gradient(ellipse at bottom right, rgba(167,139,250,.08) 0%, transparent 40%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 18px 14px 40px;
    }
    .wrap { max-width: 980px; margin: 0 auto; }

    #lock {
      position: fixed; inset: 0; z-index: 999;
      background: rgba(8,12,22,.96);
      display: flex; align-items: center; justify-content: center;
    }
    .lock-box {
      width: min(340px, 92vw);
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 34px 28px;
      text-align: center;
    }
    .lock-box .icon { font-size: 42px; margin-bottom: 12px; }
    .lock-box h2 { font-size: 26px; font-weight: 900; margin-bottom: 8px; }
    .lock-box p { font-size: 16px; color: var(--muted); margin-bottom: 18px; line-height: 1.7; }
    .lock-input {
      width: 100%; padding: 14px 16px; border-radius: 14px; border: 1px solid rgba(148,163,184,.22);
      background: rgba(255,255,255,.05); color: var(--text); font-size: 20px; text-align: center; margin-bottom: 12px;
    }
    .lock-btn {
      width: 100%; padding: 14px; border-radius: 14px; border: 1px solid rgba(96,165,250,.3);
      background: rgba(96,165,250,.16); color: var(--blue); font-size: 18px; font-weight: 900; cursor: pointer;
    }
    .lock-err { color: #f87171; font-size: 15px; min-height: 20px; margin-top: 10px; }

    .header { margin-bottom: 20px; }
    .header h1 { font-size: clamp(30px, 7vw, 44px); font-weight: 900; }
    .header h1 span { color: var(--blue); }
    .header-meta { margin-top: 10px; color: var(--muted); font-size: 16px; line-height: 1.8; }
    .updated-tag {
      display: inline-block; background: rgba(96,165,250,.12); border: 1px solid rgba(96,165,250,.2);
      border-radius: 12px; padding: 5px 12px; font-size: 15px; color: var(--blue); margin-right: 8px;
    }

    .tabs {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px;
    }
    .tab-btn {
      border: 1px solid var(--line); background: var(--card); color: var(--soft);
      border-radius: 18px; padding: 16px 10px; font-size: 18px; font-weight: 900; cursor: pointer;
    }
    .tab-btn.active { background: rgba(96,165,250,.18); color: #ffffff; border-color: rgba(96,165,250,.35); }

    .page { display: none; }
    .page.active { display: block; }

    .card {
      background: var(--card); border: 1px solid var(--line); border-radius: 24px; padding: 22px; margin-bottom: 16px;
    }
    .section-title { font-size: 24px; font-weight: 900; margin: 0 0 14px; }
    .body-text { font-size: 18px; line-height: 1.9; color: var(--soft); }

    .brain-title {
      font-size: 20px; font-weight: 900; color: var(--purple); margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .brain-model-tag {
      margin-left: auto; background: rgba(167,139,250,.12); border: 1px solid rgba(167,139,250,.22);
      border-radius: 12px; padding: 5px 12px; font-size: 14px; color: var(--purple);
    }
    .brain-row { margin-bottom: 16px; }
    .brain-row-head { display: flex; justify-content: space-between; align-items: baseline; gap: 12px; margin-bottom: 8px; }
    .brain-row-label { font-size: 18px; font-weight: 800; }
    .brain-row-right { font-size: 16px; color: var(--muted); text-align: right; }
    .bar-bg { width: 100%; height: 14px; border-radius: 999px; background: rgba(255,255,255,.08); overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; }
    .bar-danger { background: linear-gradient(90deg, #f87171, #fbbf24); }
    .bar-warn { background: linear-gradient(90deg, #fbbf24, #a78bfa); }
    .bar-ok { background: linear-gradient(90deg, #60a5fa, #a78bfa); }
    .bar-ctx { background: linear-gradient(90deg, #2dd4bf, #60a5fa); }
    .brain-refill { font-size: 15px; color: var(--muted); margin-top: 8px; }

    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
    .stat-card { background: var(--card); border: 1px solid var(--line); border-radius: 24px; padding: 22px; }
    .stat-label { font-size: 18px; color: var(--muted); margin-bottom: 8px; font-weight: 800; }
    .stat-value { font-size: clamp(34px, 8vw, 50px); font-weight: 900; }
    .stat-sub { font-size: 17px; color: var(--muted); margin-top: 8px; line-height: 1.7; }
    .c-green { color: var(--green); }
    .c-blue { color: var(--blue); }
    .c-amber { color: var(--amber); }
    .c-purple { color: var(--purple); }

    .list { display: flex; flex-direction: column; gap: 14px; }
    .item {
      background: var(--card); border: 1px solid var(--line); border-radius: 24px; padding: 20px;
    }
    .item-title { font-size: 22px; font-weight: 900; line-height: 1.5; margin-bottom: 8px; }
    .item-desc { font-size: 17px; color: var(--muted); line-height: 1.8; }
    .item-footer { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 12px; }
    .tag {
      display: inline-block; font-size: 14px; font-weight: 900; padding: 5px 10px; border-radius: 10px;
      border: 1px solid transparent;
    }
    .t-done { background: rgba(74,222,128,.12); color: var(--green); border-color: rgba(74,222,128,.2); }
    .t-in_progress, .t-active { background: rgba(96,165,250,.12); color: var(--blue); border-color: rgba(96,165,250,.2); }
    .t-active_cron, .t-ready { background: rgba(45,212,191,.12); color: var(--teal); border-color: rgba(45,212,191,.2); }
    .t-todo, .t-planned { background: rgba(148,163,184,.08); color: var(--muted); border-color: rgba(148,163,184,.15); }
    .t-cat { background: rgba(251,191,36,.08); color: var(--amber); border-color: rgba(251,191,36,.18); }
    .t-token { background: rgba(167,139,250,.1); color: var(--purple); border-color: rgba(167,139,250,.2); }
    .doc-link { color: var(--blue); font-size: 16px; text-decoration: none; font-weight: 800; }

    .refresh-btn {
      appearance: none; border: 1px solid rgba(96,165,250,.25); background: rgba(96,165,250,.12);
      color: var(--blue); padding: 14px 24px; border-radius: 14px; font-size: 18px; font-weight: 900; cursor: pointer;
      display: block; margin: 26px auto 0;
    }
    #loading { text-align: center; padding: 50px 0; color: var(--muted); font-size: 18px; }
    #app { display: none; }

    @media (max-width: 700px) {
      .tabs { grid-template-columns: repeat(2, 1fr); }
      .brain-row-head { flex-direction: column; align-items: flex-start; }
      .brain-row-right { text-align: left; }
    }
  </style>
</head>
<body>
  <div id="lock">
    <div class="lock-box">
      <div class="icon">🌿</div>
      <h2>知微 Dashboard</h2>
      <p>請輸入密碼才能查看</p>
      <input class="lock-input" id="pw" type="password" placeholder="password" autofocus onkeydown="if(event.key==='Enter')unlock()" />
      <button class="lock-btn" onclick="unlock()">進入</button>
      <div class="lock-err" id="lock-err"></div>
    </div>
  </div>

  <div class="wrap">
    <div id="loading">⏳ 載入中…</div>
    <div id="app">
      <div class="header">
        <h1>知微<span> Dashboard</span></h1>
        <div class="header-meta">
          <span class="updated-tag" id="updated-tag">—</span>
          <span id="meta-note"></span>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" onclick="showPage('home', this)">首頁</button>
        <button class="tab-btn" onclick="showPage('tasks', this)">任務</button>
        <button class="tab-btn" onclick="showPage('team', this)">團隊</button>
        <button class="tab-btn" onclick="showPage('watch', this)">追蹤</button>
      </div>

      <div id="page-home" class="page active">
        <div id="brain-panel"></div>
        <div class="stats" id="stats"></div>
        <div class="card">
          <div class="section-title">最近重要進展</div>
          <div class="list" id="handoff-list"></div>
        </div>
        <div class="card">
          <div class="section-title">下一步</div>
          <div class="list" id="next-list"></div>
        </div>
      </div>

      <div id="page-tasks" class="page">
        <div class="card">
          <div class="section-title">任務</div>
          <div class="list" id="task-list"></div>
        </div>
      </div>

      <div id="page-team" class="page">
        <div class="card">
          <div class="section-title">團隊說明</div>
          <div class="body-text" id="agent-summary"></div>
        </div>
        <div class="list" id="agent-list"></div>
      </div>

      <div id="page-watch" class="page">
        <div class="card">
          <div class="section-title">長期追蹤清單</div>
          <div class="list" id="watchlist-list"></div>
        </div>
        <div class="card">
          <div class="section-title">Token 紀錄</div>
          <div class="list" id="token-list"></div>
        </div>
      </div>

      <button class="refresh-btn" onclick="load()">↺ 重新載入</button>
    </div>
  </div>

  <script>
    const STATUS_MAP = {
      done: { label: '已完成', cls: 't-done' },
      in_progress: { label: '進行中', cls: 't-in_progress' },
      active_cron: { label: '自動執行中', cls: 't-active_cron' },
      todo: { label: '待辦', cls: 't-todo' },
    };
    const AGENT_STATUS_MAP = {
      active: { label: 'active', cls: 't-active' },
      ready: { label: 'ready', cls: 't-ready' },
      planned: { label: 'planned', cls: 't-planned' }
    };
    function fmt(n) { return n >= 1000 ? (n / 1000).toFixed(1) + 'k' : n.toString(); }
    function showPage(name, btn) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + name).classList.add('active');
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
    async function load() {
      try {
        const res = await fetch('./data.json?t=' + Date.now());
        const d = await res.json();
        render(d);
      } catch (e) {
        document.getElementById('loading').textContent = '❌ 載入失敗：' + e.message;
      }
    }
    function render(d) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      document.getElementById('updated-tag').textContent = '更新：' + d.meta.updated;
      document.getElementById('meta-note').textContent = d.meta.note || '';

      const b = d.brain;
      const dailyCls = b.daily_pct_left <= 20 ? 'bar-danger' : b.daily_pct_left <= 50 ? 'bar-warn' : 'bar-ok';
      const weekCls  = b.weekly_pct_left <= 20 ? 'bar-danger' : b.weekly_pct_left <= 50 ? 'bar-warn' : 'bar-ok';
      const ctxCls   = b.context_pct >= 80 ? 'bar-danger' : b.context_pct >= 50 ? 'bar-warn' : 'bar-ctx';
      document.getElementById('brain-panel').innerHTML = `
        <div class="card">
          <div class="brain-title">🧠 知微腦力值 <span class="brain-model-tag">${b.model}</span></div>
          <div class="brain-row">
            <div class="brain-row-head"><span class="brain-row-label">今日剩餘</span><span class="brain-row-right"><strong>${b.daily_pct_left}%</strong> · 剩 ${b.daily_time_left}</span></div>
            <div class="bar-bg"><div class="bar-fill ${dailyCls}" style="width:${b.daily_pct_left}%"></div></div>
            <div class="brain-refill">${b.daily_refill}</div>
          </div>
          <div class="brain-row">
            <div class="brain-row-head"><span class="brain-row-label">本週剩餘</span><span class="brain-row-right"><strong>${b.weekly_pct_left}%</strong> · 剩 ${b.weekly_time_left}</span></div>
            <div class="bar-bg"><div class="bar-fill ${weekCls}" style="width:${b.weekly_pct_left}%"></div></div>
            <div class="brain-refill">${b.weekly_refill}</div>
          </div>
          <div class="brain-row">
            <div class="brain-row-head"><span class="brain-row-label">Context 使用</span><span class="brain-row-right"><strong>${b.context_pct}%</strong> · ${b.context_used} / ${b.context_limit}</span></div>
            <div class="bar-bg"><div class="bar-fill ${ctxCls}" style="width:${b.context_pct}%"></div></div>
          </div>
        </div>`;

      const done = d.tasks.filter(t => t.status === 'done').length;
      const inprog = d.tasks.filter(t => t.status === 'in_progress' || t.status === 'active_cron').length;
      const todo = d.tasks.filter(t => t.status === 'todo').length;
      const total_tok = d.token_log.reduce((a, r) => a + r.tokens, 0);
      document.getElementById('stats').innerHTML = `
        <div class="stat-card"><div class="stat-label">今天狀態</div><div class="stat-value c-green">${done}</div><div class="stat-sub">已完成 ${done} 項</div></div>
        <div class="stat-card"><div class="stat-label">目前推進中</div><div class="stat-value c-blue">${inprog}</div><div class="stat-sub">正在進行 / 自動執行</div></div>
        <div class="stat-card"><div class="stat-label">還待處理</div><div class="stat-value c-amber">${todo}</div><div class="stat-sub">下一步待做</div></div>
        <div class="stat-card"><div class="stat-label">累計 token</div><div class="stat-value c-purple">${fmt(total_tok)}</div><div class="stat-sub">僅供參考</div></div>`;

      const team = d.agent_team || {};
      document.getElementById('handoff-list').innerHTML = (team.recent_handoffs || []).map(h => `
        <div class="item">
          <div class="item-title">${h.task}</div>
          <div class="item-desc">由 ${h.owner} 接手，結果：${h.result}${h.memory ? '，已沉澱進記憶 / 文檔' : ''}</div>
        </div>`).join('');
      document.getElementById('next-list').innerHTML = (team.next_actions || []).map(n => `
        <div class="item"><div class="item-desc">• ${n}</div></div>`).join('');

      document.getElementById('agent-summary').textContent = team.summary || '—';
      document.getElementById('agent-list').innerHTML = (team.agents || []).map(a => {
        const s = AGENT_STATUS_MAP[a.status] || AGENT_STATUS_MAP.planned;
        return `
          <div class="item">
            <div class="item-title">${a.name}</div>
            <div class="item-desc">${a.role}</div>
            <div class="item-desc">${a.last_action}</div>
            <div class="item-footer">
              <span class="tag ${s.cls}">${s.label}</span>
              ${a.doc ? `<a class="doc-link" href="https://github.com/milogn091-ux/-0328/blob/main/${a.doc}" target="_blank">查看文件</a>` : ''}
            </div>
          </div>`;
      }).join('');

      const order = ['in_progress', 'todo', 'active_cron', 'done'];
      const sorted = [...d.tasks].sort((a, b) => order.indexOf(a.status) - order.indexOf(b.status));
      document.getElementById('task-list').innerHTML = sorted.map(t => {
        const s = STATUS_MAP[t.status] || STATUS_MAP.todo;
        return `
          <div class="item">
            <div class="item-title">${t.title}</div>
            <div class="item-desc">${t.desc}</div>
            <div class="item-footer">
              <span class="tag ${s.cls}">${s.label}</span>
              <span class="tag t-cat">${t.category}</span>
              ${t.tokens ? `<span class="tag t-token">${fmt(t.tokens)} tok</span>` : ''}
            </div>
          </div>`;
      }).join('');

      document.getElementById('watchlist-list').innerHTML = (d.watchlists || []).map(w => `
        <div class="item">
          <div class="item-title">${w.name}</div>
          <div class="item-desc">${w.desc}</div>
          <div class="item-footer">
            <span class="tag ${w.status === 'active' ? 't-active' : 't-planned'}">${w.status}</span>
            ${w.doc ? `<a class="doc-link" href="https://github.com/milogn091-ux/-0328/blob/main/${w.doc}" target="_blank">查看清單</a>` : ''}
          </div>
        </div>`).join('');

      document.getElementById('token-list').innerHTML = (d.token_log || []).map(r => `
        <div class="item">
          <div class="item-title">${r.date}</div>
          <div class="item-desc">${r.session}</div>
          <div class="item-footer"><span class="tag t-token">${fmt(r.tokens)} tok</span></div>
        </div>`).join('');
    }
    function hashStr(s) {
      let h = 0;
      for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
      return Math.abs(h).toString(16).padStart(8, '0');
    }
    const SESSION_KEY = 'zw_unlocked';
    function unlock() {
      const val = document.getElementById('pw').value;
      const expected = hashStr('Sylvie');
      if (hashStr(val) === expected || val === 'Sylvie') {
        sessionStorage.setItem(SESSION_KEY, '1');
        document.getElementById('lock').style.display = 'none';
        load();
      } else {
        document.getElementById('lock-err').textContent = '密碼錯誤，請再試一次。';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    }
    if (sessionStorage.getItem(SESSION_KEY) === '1') {
      document.getElementById('lock').style.display = 'none';
      load();
    }
  </script>
</body>
</html>
