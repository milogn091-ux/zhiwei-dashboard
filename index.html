<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>知微工作 Dashboard</title>
  <style>
    /* lock screen */
    #lock {
      position: fixed; inset: 0; z-index: 999;
      background: radial-gradient(ellipse at top left, rgba(96,165,250,.12) 0%, transparent 40%),
                  radial-gradient(ellipse at bottom right, rgba(167,139,250,.08) 0%, transparent 40%),
                  #0a0f1a;
      display: flex; align-items: center; justify-content: center;
    }
    .lock-box {
      background: rgba(14,21,38,.95);
      border: 1px solid rgba(148,163,184,.15);
      border-radius: 22px;
      padding: 36px 32px 28px;
      text-align: center;
      width: min(320px, 90vw);
    }
    .lock-box .icon { font-size: 36px; margin-bottom: 12px; }
    .lock-box h2 { font-size: 20px; font-weight: 900; color: #e8f0ff; margin-bottom: 4px; }
    .lock-box p { font-size: 12px; color: #8fa4c0; margin-bottom: 20px; }
    .lock-input {
      width: 100%; padding: 12px 14px; border-radius: 12px;
      border: 1px solid rgba(148,163,184,.2);
      background: rgba(255,255,255,.04); color: #e8f0ff;
      font-size: 16px; font-family: inherit; outline: none;
      margin-bottom: 12px; text-align: center; letter-spacing: .1em;
    }
    .lock-input:focus { border-color: rgba(96,165,250,.45); }
    .lock-btn {
      width: 100%; padding: 12px; border-radius: 12px;
      border: 1px solid rgba(96,165,250,.3);
      background: rgba(96,165,250,.15); color: #60a5fa;
      font-size: 14px; font-weight: 800; cursor: pointer; font-family: inherit;
    }
    .lock-btn:hover { background: rgba(96,165,250,.25); }
    .lock-err { color: #f87171; font-size: 12px; margin-top: 10px; min-height: 16px; }
    :root {
      --bg: #0a0f1a;
      --card: rgba(14, 21, 38, 0.92);
      --line: rgba(148, 163, 184, 0.12);
      --text: #e8f0ff;
      --muted: #8fa4c0;
      --soft: #c8d8f0;
      --green: #4ade80;
      --blue: #60a5fa;
      --amber: #fbbf24;
      --purple: #a78bfa;
      --red: #f87171;
      --teal: #2dd4bf;
      --radius: 18px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Microsoft JhengHei", "PingFang TC", "Noto Sans TC", sans-serif;
      background: radial-gradient(ellipse at top left, rgba(96,165,250,.12) 0%, transparent 40%),
                  radial-gradient(ellipse at bottom right, rgba(167,139,250,.08) 0%, transparent 40%),
                  var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 20px 16px 48px;
    }
    .wrap { max-width: 900px; margin: 0 auto; }

    /* header */
    .header { margin-bottom: 28px; }
    .header h1 { font-size: clamp(22px, 5vw, 32px); font-weight: 900; letter-spacing: -.03em; }
    .header h1 span { color: var(--blue); }
    .header-meta { margin-top: 6px; color: var(--muted); font-size: 13px; }
    .updated-tag { display: inline-block; background: rgba(96,165,250,.12); border: 1px solid rgba(96,165,250,.2); border-radius: 8px; padding: 2px 10px; font-size: 11px; color: var(--blue); margin-right: 8px; }

    /* brain panel */
    .brain-panel {
      background: var(--card);
      border: 1px solid rgba(167,139,250,.2);
      border-radius: var(--radius);
      padding: 18px 20px 16px;
      margin-bottom: 22px;
    }
    .brain-title {
      font-size: 11px; font-weight: 800; text-transform: uppercase;
      letter-spacing: .1em; color: var(--purple); margin-bottom: 14px;
      display: flex; align-items: center; gap: 6px;
    }
    .brain-model-tag {
      display: inline-block;
      background: rgba(167,139,250,.12); border: 1px solid rgba(167,139,250,.22);
      border-radius: 8px; padding: 2px 10px; font-size: 11px; font-weight: 700;
      color: var(--purple); margin-left: auto; letter-spacing: 0;
      text-transform: none;
    }
    .brain-rows { display: flex; flex-direction: column; gap: 12px; }
    .brain-row {}
    .brain-row-head {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-bottom: 6px;
    }
    .brain-row-label { font-size: 12px; font-weight: 700; color: var(--soft); }
    .brain-row-right { font-size: 11px; color: var(--muted); text-align: right; }
    .brain-row-right strong { color: var(--text); font-weight: 800; }
    .bar-bg {
      width: 100%; height: 8px; border-radius: 99px;
      background: rgba(255,255,255,.06); overflow: hidden;
    }
    .bar-fill {
      height: 100%; border-radius: 99px; transition: width .4s ease;
    }
    .bar-danger { background: linear-gradient(90deg, #f87171, #fbbf24); }
    .bar-warn   { background: linear-gradient(90deg, #fbbf24, #a78bfa); }
    .bar-ok     { background: linear-gradient(90deg, #60a5fa, #a78bfa); }
    .bar-ctx    { background: linear-gradient(90deg, #2dd4bf, #60a5fa); }
    .brain-refill {
      font-size: 10px; color: var(--muted); margin-top: 4px;
      display: flex; align-items: center; gap: 4px;
    }
    .brain-refill-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--green);
      animation: pulse 2s infinite;
    }
    .brain-divider { height: 1px; background: var(--line); margin: 4px 0; }

    /* stat row */
    .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 28px; }
    .stat-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px 18px; }
    .stat-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 6px; }
    .stat-value { font-size: clamp(22px, 4vw, 30px); font-weight: 900; letter-spacing: -.02em; }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 3px; }
    .c-green { color: var(--green); }
    .c-blue { color: var(--blue); }
    .c-amber { color: var(--amber); }
    .c-purple { color: var(--purple); }

    /* section */
    .section-title { font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); margin: 24px 0 12px; }

    /* task list */
    .task-list { display: flex; flex-direction: column; gap: 10px; }
    .task-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      transition: border-color .2s;
    }
    .task-card:hover { border-color: rgba(148,163,184,.28); }
    .task-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 5px;
    }
    .dot-done { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot-in_progress { background: var(--blue); box-shadow: 0 0 6px var(--blue); animation: pulse 1.8s infinite; }
    .dot-active_cron { background: var(--teal); box-shadow: 0 0 6px var(--teal); }
    .dot-todo { background: var(--line); border: 1.5px solid var(--muted); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .task-body { flex: 1; min-width: 0; }
    .task-title { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
    .task-desc { font-size: 12px; color: var(--muted); line-height: 1.55; }
    .task-footer { display: flex; align-items: center; gap: 10px; margin-top: 8px; flex-wrap: wrap; }
    .tag {
      font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 6px; letter-spacing: .04em;
    }
    .t-done { background: rgba(74,222,128,.12); color: var(--green); border: 1px solid rgba(74,222,128,.2); }
    .t-in_progress { background: rgba(96,165,250,.12); color: var(--blue); border: 1px solid rgba(96,165,250,.2); }
    .t-active_cron { background: rgba(45,212,191,.12); color: var(--teal); border: 1px solid rgba(45,212,191,.2); }
    .t-todo { background: rgba(148,163,184,.08); color: var(--muted); border: 1px solid rgba(148,163,184,.15); }
    .t-token { background: rgba(167,139,250,.10); color: var(--purple); border: 1px solid rgba(167,139,250,.2); font-family: monospace; }
    .t-cat { background: rgba(251,191,36,.08); color: var(--amber); border: 1px solid rgba(251,191,36,.18); }
    .task-date { font-size: 10px; color: var(--muted); margin-left: auto; }

    /* token log */
    .token-table { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
    .token-row { display: grid; grid-template-columns: 100px 1fr 100px; padding: 10px 16px; border-bottom: 1px solid var(--line); font-size: 12px; align-items: center; gap: 8px; }
    .token-row:last-child { border-bottom: none; }
    .token-row.head { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); background: rgba(255,255,255,.02); }
    .token-num { color: var(--purple); font-family: monospace; font-weight: 700; text-align: right; }

    /* refresh btn */
    .refresh-btn {
      appearance: none; border: 1px solid rgba(96,165,250,.25); background: rgba(96,165,250,.1);
      color: var(--blue); padding: 7px 18px; border-radius: 10px; font-size: 12px; font-weight: 700;
      cursor: pointer; margin-top: 32px; display: block; margin-left: auto;
    }
    .refresh-btn:hover { background: rgba(96,165,250,.18); }

    /* loading */
    #loading { text-align: center; padding: 48px 0; color: var(--muted); font-size: 14px; }
    #app { display: none; }

    @media (max-width: 600px) {
      .token-row { grid-template-columns: 80px 1fr 80px; }
    }
  </style>
</head>
<body>
  <div id="lock">
    <div class="lock-box">
      <div class="icon">🌿</div>
      <h2>知微 Dashboard</h2>
      <p>請輸入密碼才能查看</p>
      <input class="lock-input" id="pw" type="password" placeholder="password" autofocus
        onkeydown="if(event.key==='Enter')unlock()" />
      <button class="lock-btn" onclick="unlock()">進入</button>
      <div class="lock-err" id="lock-err"></div>
    </div>
  </div>

  <div class="wrap">
    <div id="loading">⏳ 載入中…</div>
    <div id="app">
      <div class="header">
        <h1>知微<span> Dashboard</span></h1>
        <div class="header-meta">
          <span class="updated-tag" id="updated-tag">—</span>
          <span id="meta-note"></span>
        </div>
      </div>

      <div id="brain-panel"></div>

      <div class="stats" id="stats"></div>

      <div class="section-title">📋 任務進度</div>
      <div class="task-list" id="task-list"></div>

      <div class="section-title">📊 Token 消耗紀錄</div>
      <div class="token-table" id="token-table"></div>

      <button class="refresh-btn" onclick="load()">↺ 重新載入</button>
    </div>
  </div>

  <script>
    const STATUS_MAP = {
      done: { label: '已完成', cls: 't-done', dot: 'dot-done' },
      in_progress: { label: '進行中', cls: 't-in_progress', dot: 'dot-in_progress' },
      active_cron: { label: '自動執行中', cls: 't-active_cron', dot: 'dot-active_cron' },
      todo: { label: '待辦', cls: 't-todo', dot: 'dot-todo' },
    };

    function fmt(n) {
      if (n >= 1000) return (n / 1000).toFixed(1) + 'k';
      return n.toString();
    }

    async function load() {
      try {
        const res = await fetch('./data.json?t=' + Date.now());
        const d = await res.json();
        render(d);
      } catch (e) {
        document.getElementById('loading').textContent = '❌ 載入失敗：' + e.message;
      }
    }

    function render(d) {
      document.getElementById('loading').style.display = 'none';
      document.getElementById('app').style.display = 'block';

      // brain panel
      const b = d.brain;
      if (b) {
        const dailyCls = b.daily_pct_left <= 20 ? 'bar-danger' : b.daily_pct_left <= 50 ? 'bar-warn' : 'bar-ok';
        const weekCls  = b.weekly_pct_left <= 20 ? 'bar-danger' : b.weekly_pct_left <= 50 ? 'bar-warn' : 'bar-ok';
        const ctxCls   = b.context_pct >= 80 ? 'bar-danger' : b.context_pct >= 50 ? 'bar-warn' : 'bar-ctx';
        document.getElementById('brain-panel').innerHTML = `
          <div class="brain-panel">
            <div class="brain-title">
              🧠 知微腦力值
              <span class="brain-model-tag">${b.model}</span>
            </div>
            <div class="brain-rows">
              <div class="brain-row">
                <div class="brain-row-head">
                  <span class="brain-row-label">今日剩餘</span>
                  <span class="brain-row-right"><strong>${b.daily_pct_left}%</strong> &nbsp;剩 ${b.daily_time_left}</span>
                </div>
                <div class="bar-bg"><div class="bar-fill ${dailyCls}" style="width:${b.daily_pct_left}%"></div></div>
                <div class="brain-refill"><span class="brain-refill-dot"></span>${b.daily_refill}</div>
              </div>
              <div class="brain-divider"></div>
              <div class="brain-row">
                <div class="brain-row-head">
                  <span class="brain-row-label">本週剩餘</span>
                  <span class="brain-row-right"><strong>${b.weekly_pct_left}%</strong> &nbsp;剩 ${b.weekly_time_left}</span>
                </div>
                <div class="bar-bg"><div class="bar-fill ${weekCls}" style="width:${b.weekly_pct_left}%"></div></div>
                <div class="brain-refill"><span class="brain-refill-dot" style="background:var(--blue)"></span>${b.weekly_refill}</div>
              </div>
              <div class="brain-divider"></div>
              <div class="brain-row">
                <div class="brain-row-head">
                  <span class="brain-row-label">Context 使用</span>
                  <span class="brain-row-right"><strong>${b.context_pct}%</strong> &nbsp;${b.context_used} / ${b.context_limit}</span>
                </div>
                <div class="bar-bg"><div class="bar-fill ${ctxCls}" style="width:${b.context_pct}%"></div></div>
              </div>
            </div>
          </div>`;
      }

      // header meta
      document.getElementById('updated-tag').textContent = '更新：' + d.meta.updated;
      document.getElementById('meta-note').textContent = d.meta.note || '';

      // stats
      const done = d.tasks.filter(t => t.status === 'done').length;
      const inprog = d.tasks.filter(t => t.status === 'in_progress').length;
      const todo = d.tasks.filter(t => t.status === 'todo').length;
      const total_tok = d.token_log.reduce((a, r) => a + r.tokens, 0);

      document.getElementById('stats').innerHTML = `
        <div class="stat-card">
          <div class="stat-label">已完成</div>
          <div class="stat-value c-green">${done}</div>
          <div class="stat-sub">共 ${d.tasks.length} 項任務</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">進行中</div>
          <div class="stat-value c-blue">${inprog}</div>
          <div class="stat-sub">含自動排程</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">待辦</div>
          <div class="stat-value c-amber">${todo}</div>
          <div class="stat-sub">需推進</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Token 累計</div>
          <div class="stat-value c-purple">${fmt(total_tok)}</div>
          <div class="stat-sub">近 ${d.token_log.length} 次紀錄</div>
        </div>
      `;

      // tasks
      const order = ['in_progress', 'todo', 'active_cron', 'done'];
      const sorted = [...d.tasks].sort((a, b) => order.indexOf(a.status) - order.indexOf(b.status));
      document.getElementById('task-list').innerHTML = sorted.map(t => {
        const s = STATUS_MAP[t.status] || STATUS_MAP.todo;
        const tokenTag = t.tokens ? `<span class="tag t-token">⚡ ${fmt(t.tokens)} tok</span>` : '';
        const catTag = `<span class="tag t-cat">${t.category}</span>`;
        const dateStr = t.date_done ? `<span class="task-date">${t.date_done}</span>` : '';
        return `
          <div class="task-card">
            <div class="task-dot ${s.dot}"></div>
            <div class="task-body">
              <div class="task-title">${t.title}</div>
              <div class="task-desc">${t.desc}</div>
              <div class="task-footer">
                <span class="tag ${s.cls}">${s.label}</span>
                ${catTag}
                ${tokenTag}
                ${dateStr}
              </div>
            </div>
          </div>`;
      }).join('');

      // token log
      document.getElementById('token-table').innerHTML =
        `<div class="token-row head"><div>日期</div><div>作業</div><div class="token-num">Token</div></div>` +
        d.token_log.map(r => `
          <div class="token-row">
            <div>${r.date}</div>
            <div>${r.session}</div>
            <div class="token-num">${fmt(r.tokens)}</div>
          </div>`).join('');
    }

    // password gate
    const PW_HASH = '1aafc8c4a4a75b7e6b7a5bc4f6d0d7f0e3b9c6e2a5f8d1c3b6e9a2f5d8c1b4e7';
    function hashStr(s) {
      // simple non-crypto hash for lightweight protection
      let h = 0;
      for (let i = 0; i < s.length; i++) h = (Math.imul(31, h) + s.charCodeAt(i)) | 0;
      return Math.abs(h).toString(16).padStart(8, '0');
    }
    const SESSION_KEY = 'zw_unlocked';
    function unlock() {
      const val = document.getElementById('pw').value;
      // store hashed answer check
      const expected = hashStr('Sylvie');
      if (hashStr(val) === expected || val === 'Sylvie') {
        sessionStorage.setItem(SESSION_KEY, '1');
        document.getElementById('lock').style.display = 'none';
        load();
      } else {
        document.getElementById('lock-err').textContent = '密碼錯誤，請再試一次。';
        document.getElementById('pw').value = '';
        document.getElementById('pw').focus();
      }
    }
    if (sessionStorage.getItem(SESSION_KEY) === '1') {
      document.getElementById('lock').style.display = 'none';
      load();
    }
  </script>
</body>
</html>
